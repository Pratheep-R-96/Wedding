<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Pratheep &amp; Fanny Praiselin — Wedding | 9 May 2026</title>
    <meta name="description" content="Join us to celebrate the wedding of Pratheep and Fanny Praiselin on Saturday, 9 May 2026, in Tirunelveli. Church wedding, reception, and evening celebration." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pratheep &amp; Fanny Praiselin — Wedding | 9 May 2026" />
    <meta property="og:description" content="Two souls, one faith, one forever — joined in Christ's love. Join us on 9 May 2026 in Tirunelveli." />
    <meta property="og:image" content="https://picsum.photos/id/1015/1200/630" />

    <!--
      LCP image preload — tells the browser to start fetching the hero background
      before the React bundle even parses, shaving ~1 s off LCP.
    -->
    <link
      rel="preload"
      as="image"
      href="https://picsum.photos/id/1015/1200/675.webp"
      imagesrcset="https://picsum.photos/id/1015/480/270.webp 480w, https://picsum.photos/id/1015/768/432.webp 768w, https://picsum.photos/id/1015/1200/675.webp 1200w, https://picsum.photos/id/1015/1920/1080.webp 1920w"
      imagesizes="100vw"
      crossorigin
    />

    <!--
      Critical font preloads — URLs must exactly match @font-face src in globals.css
      so the browser reuses the preloaded file instead of fetching it twice.
    -->
    <link rel="preload" href="/fonts/playfair-display-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/great-vibes-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
